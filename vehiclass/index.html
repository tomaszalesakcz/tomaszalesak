<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehiclass Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f7f5; --surface: #ffffff; --surface2: #f0efeb;
  --border: rgba(0,0,0,0.07); --border2: rgba(0,0,0,0.12);
  --text: #1a1a18; --text-muted: #6b6b67; --text-faint: #9e9e9a;
  --accent: #1a6eff; --accent-bg: #eef3ff;
  --green: #16a34a; --green-bg: #f0fdf4;
  --red: #dc2626; --red-bg: #fef2f2;
  --r: 12px; --rs: 8px;
}
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:14px; }
.shell { display:flex; min-height:100vh; }

/* Sidebar */
.sidebar { width:224px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); position:fixed; height:100vh; z-index:1000; }
.logo { padding:22px 20px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:11px; }
.logo-mark { width:34px; height:34px; background:var(--accent); border-radius:9px; display:flex; align-items:center; justify-content:center; }
nav { padding:14px 10px; }
.nav-item { display:flex; align-items:center; gap:9px; padding:10px; border-radius:var(--rs); cursor:pointer; color:var(--text-muted); border:none; background:none; width:100%; text-align:left; font-family:inherit; margin-bottom:4px; transition: 0.2s; }
.nav-item:hover { background:var(--bg); color:var(--text); }
.nav-item.active { background:var(--accent-bg); color:var(--accent); font-weight:500; }

/* Main Content */
.main { flex:1; margin-left:224px; padding:30px 40px; min-width:0; }
.topbar { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:30px; }
.ptitle { font-size:22px; font-weight:600; letter-spacing:-0.5px; }
.psub { font-size:13px; color:var(--text-muted); margin-top:4px; }

.seg { display:flex; background:var(--surface); border:1px solid var(--border); border-radius:var(--rs); overflow:hidden; }
.seg-btn { padding:7px 14px; font-size:12.5px; border:none; background:none; cursor:pointer; border-right:1px solid var(--border); }
.seg-btn.on { background:var(--accent); color:#fff; }

/* KPI */
.krow { display:grid; gap:16px; margin-bottom:24px; grid-template-columns:repeat(3,1fr); }
.kcard { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:20px; }
.klbl { font-size:11px; font-weight:600; color:var(--text-faint); text-transform:uppercase; margin-bottom:8px; }
.kval { font-size:28px; font-weight:600; font-family:'DM Mono',monospace; }
.knote { font-size:12px; color:var(--text-muted); margin-top:4px; }

/* Tables */
.view-section { display:none; }
.view-section.active { display:block; }
.tcard { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
table { width:100%; border-collapse:collapse; text-align:left; }
thead th { padding:12px 16px; font-size:11px; font-weight:600; color:var(--text-faint); text-transform:uppercase; background:var(--bg); border-bottom:1px solid var(--border); }
td { padding:14px 16px; border-bottom:1px solid var(--border); font-size:13.5px; }
.r { text-align:right; }
.rev-val { color:var(--green); font-weight:600; font-family:'DM Mono'; }

#loader-wrap { position:fixed; top:0; left:0; width:100%; height:3px; z-index:2000; display:none; }
#loader-bar { height:100%; background:var(--accent); width:0%; transition:width 0.3s; }
.ebar { background:var(--red-bg); color:var(--red); padding:12px; border-radius:8px; margin-bottom:20px; display:none; font-size:13px; }
</style>
</head>
<body>

<div id="loader-wrap"><div id="loader-bar"></div></div>

<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M21 21H3V3h18v18zM8 15h2v-2H8v2zm0-4h2V9H8v2zm4 4h2v-2h-2v2zm0-4h2V9h-2v2zm4 4h2v-2h-2v2zm0-4h2V9h-2v2z"/></svg></div>
    <div style="font-weight:600; margin-left:10px">Vehiclass</div>
  </div>
  <nav>
    <button class="nav-item active" data-view="overview">Přehled</button>
    <button class="nav-item" data-view="campaigns">Kampaně</button>
    <button class="nav-item" data-view="automations">Automatizace</button>
  </nav>
</aside>

<main class="main">
  <div id="error-bar" class="ebar"></div>

  <div class="topbar">
    <div>
      <div class="ptitle" id="ptitle">Přehled</div>
      <div class="psub" id="psub">Načítám...</div>
    </div>
    <div class="tctrl">
      <div class="seg">
        <button class="seg-btn" data-d="7">7 dní</button>
        <button class="seg-btn on" data-d="30">30 dní</button>
        <button class="seg-btn" data-d="90">3 měs.</button>
      </div>
      <button id="refresh-btn" style="margin-left:10px; padding:7px 12px; cursor:pointer; background:white; border:1px solid var(--border); border-radius:8px; font-size:12px">Obnovit</button>
    </div>
  </div>

  <div id="view-overview" class="view-section active">
    <div class="krow">
      <div class="kcard"><div class="klbl">Tržby celkem</div><div id="k-total-rev" class="kval">—</div><div class="knote">Kampaně + Automaty</div></div>
      <div class="kcard"><div class="klbl">Tržby z kampaní</div><div id="k-camp-rev" class="kval">—</div><div id="k-camp-note" class="knote">&nbsp;</div></div>
      <div class="kcard"><div class="klbl">Tržby z automatizací</div><div id="k-auto-rev" class="kval">—</div><div id="k-auto-note" class="knote">&nbsp;</div></div>
    </div>
    <div class="tcard">
      <table>
        <thead><tr><th>Poslední Kampaně</th><th class="r">Odesláno</th><th class="r">Open Rate</th><th class="r">Tržby</th></tr></thead>
        <tbody id="ov-table-body"></tbody>
      </table>
    </div>
  </div>

  <div id="view-campaigns" class="view-section">
    <div class="tcard">
      <table>
        <thead><tr><th>Název kampaně</th><th class="r">Datum</th><th class="r">Příjemci</th><th class="r">Open Rate</th><th class="r">CTR</th><th class="r">Tržby</th></tr></thead>
        <tbody id="camp-table-body"></tbody>
      </table>
    </div>
  </div>

  <div id="view-automations" class="view-section">
    <div class="tcard">
      <table>
        <thead><tr><th>Název automatizace</th><th class="r">Lidí v období</th><th class="r">OR (celk)</th><th class="r">Nákupů v období</th><th class="r">Tržby v období</th></tr></thead>
        <tbody id="auto-table-body"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
const WORKER = 'https://vehiclass.jsem-72e.workers.dev';
let days = 30;

// --- NAVIGACE ---
function initNav() {
    document.querySelectorAll('.nav-item').forEach(item => {
        item.onclick = () => {
            const view = item.getAttribute('data-view');
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            item.classList.add('active');
            document.getElementById('ptitle').innerText = item.innerText;
        };
    });

    document.querySelectorAll('.seg-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('on'));
            btn.classList.add('on');
            days = parseInt(btn.getAttribute('data-d'));
            loadData();
        };
    });

    document.getElementById('refresh-btn').onclick = () => loadData();
}

const czk = v => Math.round(v || 0).toLocaleString('cs-CZ') + ' Kč';
const pct = v => (v || 0).toFixed(1) + '%';
const num = v => Math.round(v || 0).toLocaleString('cs-CZ');

async function api(path) {
    const r = await fetch(`${WORKER}?path=${encodeURIComponent(path)}`);
    const data = await r.json();
    if (!r.ok) throw new Error(data.message || `Chyba API ${r.status}`);
    return data;
}

async function loadData() {
    const loader = document.getElementById('loader-wrap');
    const lbar = document.getElementById('loader-bar');
    const ebar = document.getElementById('error-bar');
    
    loader.style.display = 'block';
    lbar.style.width = '10%';
    ebar.style.display = 'none';

    const dTo = new Date(); dTo.setHours(23,59,59);
    const dFrom = new Date(); dFrom.setDate(dFrom.getDate() - days); dFrom.setHours(0,0,0);
    
    document.getElementById('psub').innerText = `Období: ${dFrom.toLocaleDateString('cs-CZ')} – ${new Date().toLocaleDateString('cs-CZ')}`;

    try {
        const dfStr = dFrom.toISOString().split('T')[0];
        const dtStr = dTo.toISOString().split('T')[0];

        // 1. Základní načtení
        const [campaigns, pipelines, transactions] = await Promise.all([
            api(`/campaigns?filters[date_from]=${dfStr}&filters[date_to]=${dtStr}&filters[status]=3`),
            api('/pipelines'),
            api(`/tracker/transaction?date_from=${dfStr}&date_to=${dtStr}&per_page=2000`)
        ]);

        lbar.style.width = '40%';

        // Mapa transakcí (Kdo nakoupil v období)
        const txMap = new Map();
        if (transactions.data) {
            transactions.data.forEach(t => {
                const email = t.email.toLowerCase().trim();
                if(!txMap.has(email)) txMap.set(email, []);
                txMap.get(email).push({ amount: parseFloat(t.amount || 0), date: new Date(t.created_at || t.date) });
            });
        }

        let cRev = 0, cOrd = 0, aRev = 0, aOrd = 0;
        let cTable = '', ovTable = '', aTable = '';

        // 2. KAMPANĚ
        for (const c of (campaigns || [])) {
            const stats = await api(`/campaigns/${c.id}/stats`);
            const s = stats.stats || {};
            const rev = parseFloat(s.conversions_value || 0);
            cRev += rev; cOrd += parseInt(s.conversions || 0);
            
            cTable += `<tr><td><strong>${c.title}</strong></td><td class="r">${c.sent_at.split(' ')[0]}</td><td class="r">${num(s.send)}</td><td class="r">${pct(s.open_rate)}</td><td class="r">${pct(s.click_rate)}</td><td class="r rev-val">${czk(rev)}</td></tr>`;
            ovTable += `<tr><td>${c.title}</td><td class="r">${num(s.send)}</td><td class="r">${pct(s.open_rate)}</td><td class="r rev-val">${czk(rev)}</td></tr>`;
        }

        lbar.style.width = '70%';

        // 3. AUTOMATIZACE (Párování nákupů s odesláním v období)
        for (const p of (pipelines || [])) {
            const detail = await api(`/pipelines/${p.id}/stats/detail?per_page=2000`);
            const stats = await api(`/pipelines/${p.id}/stats`);
            const s = stats.stats || {};
            
            let pRev = 0, pOrd = 0, pCount = 0;
            if (detail.data) {
                detail.data.forEach(sub => {
                    const email = sub.email.toLowerCase().trim();
                    const sentAt = new Date(sub.sent_at);
                    
                    // Počítáme lidi, kteří dostali e-mail v tomto období
                    if (sentAt >= dFrom && sentAt <= dTo) {
                        pCount++;
                        // Pokud tento člověk ZÁROVEŇ nakoupil v našem období
                        if (txMap.has(email)) {
                            const purchases = txMap.get(email);
                            purchases.forEach(px => {
                                // Nákup musí proběhnout PO odeslání e-mailu (nebo ve stejný den)
                                if (px.date >= sentAt) {
                                    pRev += px.amount;
                                    pOrd++;
                                }
                            });
                        }
                    }
                });
            }

            aRev += pRev; aOrd += pOrd;
            if (pCount > 0 || pRev > 0) {
                aTable += `<tr><td><strong>${p.name}</strong></td><td class="r">${num(pCount)}</td><td class="r">${pct(s.open_rate)}</td><td class="r">${pOrd}</td><td class="r rev-val">${czk(pRev)}</td></tr>`;
            }
        }

        // 4. Vykreslení KPI
        document.getElementById('k-total-rev').innerText = czk(cRev + aRev);
        document.getElementById('k-camp-rev').innerText = czk(cRev);
        document.getElementById('k-camp-note').innerText = `${cOrd} objednávek`;
        document.getElementById('k-auto-rev').innerText = czk(aRev);
        document.getElementById('k-auto-note').innerText = `${aOrd} objednávek v období`;

        document.getElementById('ov-table-body').innerHTML = ovTable || '<tr><td colspan="4">Žádná data</td></tr>';
        document.getElementById('camp-table-body').innerHTML = cTable || '<tr><td colspan="6">Žádná data</td></tr>';
        document.getElementById('auto-table-body').innerHTML = aTable || '<tr><td colspan="5">Žádné konverze v období</td></tr>';

    } catch (e) {
        ebar.innerText = "Chyba: " + e.message;
        ebar.style.display = 'block';
        console.error(e);
    } finally {
        lbar.style.width = '100%';
        setTimeout(() => { loader.style.display = 'none'; lbar.style.width = '0%'; }, 500);
    }
}

initNav();
loadData();
</script>
</body>
</html>
