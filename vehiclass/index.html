<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Email Analytics Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fa; --card: #ffffff; --text: #1a1a1a; --muted: #6c757d;
            --accent: #1a6eff; --border: #e9ecef; --green: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; }
        
        /* Sidebar */
        .sidebar { width: 240px; height: 100vh; background: white; border-right: 1px solid var(--border); position: fixed; padding: 20px; }
        .nav-item { padding: 12px; margin-bottom: 5px; cursor: pointer; border-radius: 8px; color: var(--muted); transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: #f0f4ff; color: var(--accent); font-weight: 500; }
        
        /* Main Content */
        .main { margin-left: 240px; flex: 1; padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
        .title h1 { font-size: 24px; letter-spacing: -0.5px; }
        .title p { color: var(--muted); font-size: 14px; }

        /* Controls */
        .controls { display: flex; gap: 10px; background: white; padding: 5px; border-radius: 10px; border: 1px solid var(--border); }
        .btn-p { padding: 8px 15px; border: none; background: none; cursor: pointer; border-radius: 6px; font-size: 13px; font-weight: 500; }
        .btn-p.active { background: var(--accent); color: white; }

        /* Grid */
        .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 12px; border: 1px solid var(--border); position: relative; }
        .card .lbl { font-size: 12px; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 10px; }
        .card .val { font-size: 28px; font-weight: 600; font-family: 'DM Mono', monospace; }
        
        /* Tables */
        .table-wrap { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #fcfcfd; padding: 15px; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .tr-green { color: var(--green); font-weight: 600; }

        .loader { height: 3px; width: 100%; background: #eee; position: fixed; top: 0; left: 0; display: none; }
        .loader-bar { height: 100%; background: var(--accent); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

<div class="loader" id="loader"><div class="loader-bar" id="loader-bar"></div></div>

<aside class="sidebar">
    <div style="font-weight: 600; font-size: 18px; margin-bottom: 30px;">Vehiclass Analytics</div>
    <div class="nav-item active">Dashboard</div>
    <div class="nav-item">Kampaně</div>
    <div class="nav-item">Automatizace</div>
</aside>

<main class="main">
    <header class="header">
        <div class="title">
            <h1 id="view-title">Celkový přehled</h1>
            <p id="date-label">Posledních 30 dní</p>
        </div>
        <div class="controls">
            <button class="btn-p" onclick="updateDate(7, this)">7 dní</button>
            <button class="btn-p active" onclick="updateDate(30, this)">30 dní</button>
            <button class="btn-p" onclick="updateDate(90, this)">3 měsíce</button>
        </div>
    </header>

    <section class="kpi-grid">
        <div class="card"><div class="lbl">Tržby celkem</div><div class="val" id="total-revenue">0 Kč</div></div>
        <div class="card"><div class="lbl">Tržby z automatizací</div><div class="val" id="auto-revenue">0 Kč</div></div>
        <div class="card"><div class="lbl">Konverzní poměr</div><div class="val" id="conv-rate">0%</div></div>
    </section>

    <div class="table-wrap">
        <table id="data-table">
            <thead>
                <tr>
                    <th>Název zdroje</th>
                    <th>Typ</th>
                    <th>Odesláno</th>
                    <th>Open Rate</th>
                    <th>CTR</th>
                    <th>Tržby</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>
</main>

<script>
    const WORKER_URL = 'VAŠE_URL_WORKERU'; // Nahraďte URL vašeho Workeru
    let days = 30;

    async function apiFetch(path) {
        const res = await fetch(`${WORKER_URL}?path=${encodeURIComponent(path)}`);
        return res.json();
    }

    function updateDate(d, btn) {
        days = d;
        document.querySelectorAll('.btn-p').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('date-label').innerText = `Posledních ${d} dní`;
        loadData();
    }

    async function loadData() {
        showLoader(true);
        const dateTo = new Date().toISOString().split('T')[0];
        const dateFrom = new Date(Date.now() - days * 24 * 60 * 60 * 1000).toISOString().split('T')[0];

        try {
            // 1. Načtení kampaní a automatizací
            const [campaigns, pipelines, transactions] = await Promise.all([
                apiFetch(`/campaigns?filters[date_from]=${dateFrom}&filters[date_to]=${dateTo}&filters[status]=3`),
                apiFetch('/pipelines'),
                apiFetch(`/tracker/transaction?date_from=${dateFrom}&date_to=${dateTo}&per_page=1000`)
            ]);

            // 2. Agregace transakcí podle e-mailu pro rychlejší vyhledávání
            const txMap = new Map();
            transactions.data.forEach(t => {
                const email = t.email.toLowerCase();
                txMap.set(email, (txMap.get(email) || 0) + parseFloat(t.amount));
            });

            let totalRev = 0;
            let autoRev = 0;
            let html = '';

            // 3. Zpracování kampaní (Ecomail vrací tržby u kampaní přímo)
            for (const camp of campaigns) {
                const stats = await apiFetch(`/campaigns/${camp.id}/stats`);
                const rev = parseFloat(stats.stats.conversions_value || 0);
                totalRev += rev;
                html += renderRow(camp.title, 'Kampaň', stats.stats.send, stats.stats.open_rate, stats.stats.click_rate, rev);
            }

            // 4. Zpracování automatizací (Klíčová část: párování transakcí v období)
            for (const pipe of pipelines) {
                const pipeStats = await apiFetch(`/pipelines/${pipe.id}/stats`);
                const details = await apiFetch(`/pipelines/${pipe.id}/stats/detail?per_page=2000`);
                
                let pipeRevInPeriod = 0;
                // Projdeme účastníky automatizace a zjistíme, zda nakoupili v daném období
                details.data.forEach(sub => {
                    const email = sub.email.toLowerCase();
                    if (txMap.has(email)) {
                        pipeRevInPeriod += txMap.get(email);
                    }
                });

                autoRev += pipeRevInPeriod;
                totalRev += pipeRevInPeriod;
                html += renderRow(pipe.name, 'Automatizace', '—', pipeStats.stats.open_rate, pipeStats.stats.click_rate, pipeRevInPeriod);
            }

            // 5. Update UI
            document.getElementById('total-revenue').innerText = `${Math.round(totalRev).toLocaleString()} Kč`;
            document.getElementById('auto-revenue').innerText = `${Math.round(autoRev).toLocaleString()} Kč`;
            document.getElementById('table-body').innerHTML = html;

        } catch (e) {
            console.error("Chyba při načítání:", e);
        }
        showLoader(false);
    }

    function renderRow(name, type, sent, open, ctr, rev) {
        return `<tr>
            <td><strong>${name}</strong></td>
            <td>${type}</td>
            <td>${sent}</td>
            <td>${open}%</td>
            <td>${ctr}%</td>
            <td class="tr-green">${Math.round(rev).toLocaleString()} Kč</td>
        </tr>`;
    }

    function showLoader(show) {
        const l = document.getElementById('loader');
        const b = document.getElementById('loader-bar');
        l.style.display = show ? 'block' : 'none';
        if (show) setTimeout(() => b.style.width = '70%', 10);
        else b.style.width = '100%';
    }

    loadData();
</script>
</body>
</html>
