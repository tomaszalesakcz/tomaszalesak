<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehiclass Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f7f5; --surface: #ffffff; --surface2: #f0efeb;
  --border: rgba(0,0,0,0.07); --border2: rgba(0,0,0,0.12);
  --text: #1a1a18; --text-muted: #6b6b67; --text-faint: #9e9e9a;
  --accent: #1a6eff; --accent-bg: #eef3ff;
  --green: #16a34a; --green-bg: #f0fdf4;
  --red: #dc2626; --red-bg: #fef2f2;
  --amber: #d97706; --amber-bg: #fffbeb;
  --r: 12px; --rs: 8px;
}
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:14px; line-height:1.5; }
.shell { display:flex; min-height:100vh; }

.sidebar { width:224px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; height:100vh; z-index:100; }
.logo { padding:22px 20px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:11px; }
.logo-mark { width:34px; height:34px; background:var(--accent); border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.logo-name { font-weight:600; font-size:15px; letter-spacing:-.3px; }
.logo-sub { font-size:11px; color:var(--text-faint); }
nav { padding:14px 10px; flex:1; }
.nav-item { display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:var(--rs); cursor:pointer; color:var(--text-muted); font-size:13.5px; border:none; background:none; width:100%; text-align:left; transition:all .15s; font-family:'DM Sans',sans-serif; }
.nav-item:hover { background:var(--bg); color:var(--text); }
.nav-item.active { background:var(--accent-bg); color:var(--accent); font-weight:500; }
.sfooter { padding:16px; border-top:1px solid var(--border); }
.spill { background:var(--bg); border-radius:var(--rs); padding:9px 12px; font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:7px; }
.sdot { width:7px; height:7px; border-radius:50%; flex-shrink:0; background:var(--green); }
.sdot.ld { background:var(--amber); animation:blink 1.2s ease-in-out infinite; }
.sdot.er { background:var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

.main { flex:1; margin-left:224px; padding:30px 36px 60px; min-width:0; }
.topbar { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:30px; gap:16px; flex-wrap:wrap; }
.ptitle { font-size:21px; font-weight:600; letter-spacing:-.45px; }
.psub { font-size:13px; color:var(--text-muted); margin-top:3px; }
.tctrl { display:flex; align-items:center; gap:10px; flex-shrink:0; flex-wrap:wrap; }

.seg { display:flex; background:var(--surface); border:1px solid var(--border); border-radius:var(--rs); overflow:hidden; }
.seg-btn { padding:7px 13px; font-size:12.5px; font-family:'DM Sans',sans-serif; font-weight:500; border:none; background:none; cursor:pointer; color:var(--text-muted); border-right:1px solid var(--border); transition:all .15s; white-space:nowrap; }
.seg-btn:hover { background:var(--bg); color:var(--text); }
.seg-btn.on { background:var(--accent); color:#fff; }

.ibtn { display:flex; align-items:center; gap:6px; padding:7px 13px; font-size:12.5px; font-family:'DM Sans',sans-serif; font-weight:500; border:1px solid var(--border); background:var(--surface); border-radius:var(--rs); cursor:pointer; color:var(--text-muted); transition:all .15s; }
.ibtn:hover { background:var(--bg); }
.ibtn svg { width:14px; height:14px; }
.ibtn.sp svg { animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

.ebar { display:none; background:var(--red-bg); border:1px solid var(--red); border-radius:var(--rs); padding:12px 16px; color:var(--red); font-size:13px; margin-bottom:22px; line-height:1.5; }

.krow { display:grid; gap:14px; margin-bottom:22px; }
.k3 { grid-template-columns:repeat(3,1fr); }
.kcard { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:18px 20px; position:relative; overflow:hidden; }
.klbl { font-size:11px; font-weight:600; color:var(--text-faint); text-transform:uppercase; letter-spacing:.07em; margin-bottom:9px; }
.kval { font-size:30px; font-weight:600; letter-spacing:-1.2px; line-height:1; margin-bottom:7px; font-family:'DM Mono',monospace; }
.knote { font-size:12px; color:var(--text-muted); min-height:18px; }

.sec { margin-bottom:24px; }
.shead { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.stitle { font-size:15px; font-weight:600; letter-spacing:-.2px; }
.smeta { font-size:12px; color:var(--text-faint); }
.tcard { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
table { width:100%; border-collapse:collapse; }
thead th { padding:10px 16px; text-align:left; font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--text-faint); background:var(--bg); border-bottom:1px solid var(--border); white-space:nowrap; }
thead th.r { text-align:right; }
tbody tr { border-bottom:1px solid var(--border); }
tbody tr:last-child { border-bottom:none; }
tbody tr:hover { background:var(--bg); }
td { padding:11px 16px; font-size:13px; }
td.r { text-align:right; font-family:'DM Mono',monospace; font-size:12.5px; color:var(--text-muted); }
.tn { font-weight:500; font-size:13px; max-width:260px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ts { font-size:11.5px; color:var(--text-faint); margin-top:2px; }
.badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:500; white-space:nowrap; }
.bg { background:var(--green-bg); color:var(--green); }
.ba { background:var(--amber-bg); color:var(--amber); }

.empty { padding:44px 20px; text-align:center; color:var(--text-faint); font-size:13px; }
.view { display:none; } 

.prog-wrap { background:var(--bg); border:1px solid var(--border); border-radius:var(--rs); padding:12px 16px; margin-bottom:18px; display:none; }
.prog-lbl { font-size:12px; color:var(--text-muted); margin-bottom:8px; }
.prog-bar { height:4px; background:var(--border2); border-radius:2px; overflow:hidden; }
.prog-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .4s; }
</style>
</head>
<body>
<div class="shell">

<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 19 19" fill="none"><rect x="2" y="2.5" width="15" height="10" rx="2.5" stroke="white" stroke-width="1.6"/><path d="M2 7l7.5 4.5L17 7" stroke="white" stroke-width="1.6"/><path d="M5 16h9M7 16v-3.5M12 16v-3.5" stroke="white" stroke-width="1.4" stroke-linecap="round"/></svg>
    </div>
    <div><div class="logo-name">Vehiclass</div><div class="logo-sub">Email Analytics</div></div>
  </div>
  <nav>
    <button class="nav-item active" id="nav-overview" onclick="goView('overview')">Přehled</button>
    <button class="nav-item" id="nav-campaigns" onclick="goView('campaigns')">Kampaně</button>
    <button class="nav-item" id="nav-automations" onclick="goView('automations')">Automatizace</button>
  </nav>
  <div class="sfooter">
    <div class="spill"><div class="sdot ld" id="sdot"></div><span id="slbl">Čekám...</span></div>
  </div>
</aside>

<main class="main">
  <div class="ebar" id="ebar"></div>

  <div class="topbar">
    <div>
      <div class="ptitle" id="ptitle">Přehled</div>
      <div class="psub" id="psub"></div>
    </div>
    <div class="tctrl" id="time-controls">
      <div class="seg">
        <button class="seg-btn" id="btn-7" onclick="setPreset(7)">7 dní</button>
        <button class="seg-btn on" id="btn-30" onclick="setPreset(30)">30 dní</button>
        <button class="seg-btn" id="btn-90" onclick="setPreset(90)">3 měs.</button>
      </div>
      <button class="ibtn" id="rbtn" onclick="loadAll()">
        <svg viewBox="0 0 14 14" fill="none"><path d="M12 7A5 5 0 112 7M12 7V4M12 7h-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Obnovit
      </button>
    </div>
  </div>

  <div class="prog-wrap" id="prog-wrap">
    <div class="prog-lbl" id="prog-lbl">Načítám data…</div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div class="view" id="vw-overview" style="display:block;">
    <div class="krow k3">
      <div class="kcard"><div class="klbl">Tržby celkem</div><div id="k-rev-total" class="kval">—</div><div class="knote" id="k-rev-total-n">Za vybrané období</div></div>
      <div class="kcard"><div
